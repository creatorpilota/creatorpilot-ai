<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorPilot AI</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#08152f,#0d2b5f);
color:white;
text-align:center;
padding:40px;
}
.card{
background:rgba(255,255,255,.1);
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
}
button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#4da3ff;
color:white;
font-size:18px;
cursor:pointer;
}
input{
width:90%;
padding:12px;
margin:15px 0;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<div class="card">
<h1>CreatorPilot AI</h1>
<p>Create Better Content with AI</p>

<input type="text" id="topic" placeholder="Enter Topic">

<button onclick="generateTitle()">Generate Title</button>

<h2 id="result"></h2>

</div>

<script>
function generateTitle(){
let topic=document.getElementById("topic").value;
if(topic==""){
alert("Please enter a topic");
return;
}
document.getElementById("result").innerHTML=
"🔥 Top 10 Amazing "+topic+" Ideas";
}
</script>

</body>
</html>
